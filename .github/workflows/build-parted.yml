name: Build Static parted-3.6 for Android arm64

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget tar xz-utils build-essential autoconf automake libtool pkg-config

    - name: Download Android NDK r25c (lightweight)
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip -d $HOME
        echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV

    - name: Download parted-3.6 source
      run: |
        wget https://ftp.gnu.org/gnu/parted/parted-3.6.tar.xz
        tar xf parted-3.6.tar.xz
        cd parted-3.6

    - name: Configure for static arm64-android build
      working-directory: parted-3.6
      run: |
        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=21
        
     ./configure \
      --host=$TARGET \
       --prefix=/tmp/parted-install \
        CC=$TOOLCHAIN/bin/$TARGET$API-clang \
        CXX=$TOOLCHAIN/bin/$TARGET$API-clang++ \
        AR=$TOOLCHAIN/bin/llvm-ar \
         LD=$TOOLCHAIN/bin/ld \
         RANLIB=$TOOLCHAIN/bin/llvm-ranlib \
         STRIP=$TOOLCHAIN/bin/llvm-strip \
         --enable-static \
        --disable-shared \
        --disable-nls \
        --disable-readline \
        --disable-device-mapper \
        --disable-debug \
        --without-uuid  
        # 关键：禁用 UUID 支持

    - name: Compile
      working-directory: parted-3.6
      run: make -j$(nproc)

    - name: Install to output dir
      working-directory: parted-3.6
      run: make install

    - name: Verify static binary
      run: |
        file /tmp/parted-install/sbin/parted
        ls -lh /tmp/parted-install/sbin/parted

    - name: Upload artifact (the static parted binary)
      uses: actions/upload-artifact@v4
      with:
        name: parted-static-arm64
        path: /tmp/parted-install/sbin/parted
        retention-days: 7
