name: Build Static sgdisk for Android arm64

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt update && sudo apt install -y wget build-essential g++ make

    - name: Download gptfdisk 1.0.10 source
      run: |
        wget https://downloads.sourceforge.net/project/gptfdisk/gptfdisk/1.0.10/gptfdisk-1.0.10.tar.gz
        tar xf gptfdisk-1.0.10.tar.gz
        cd gptfdisk-1.0.10

    - name: Compile static sgdisk
      working-directory: gptfdisk-1.0.10
      run: |
        make CXXFLAGS="-static -static-libgcc -static-libstdc++" LDFLAGS="-static"
        strip sgdisk

    - name: Verify binary
      run: |
        file gptfdisk-1.0.10/sgdisk
        ls -lh gptfdisk-1.0.10/sgdisk

    - name: Upload static sgdisk
      uses: actions/upload-artifact@v4
      with:
        name: sgdisk-static-arm64
        path: gptfdisk-1.0.10/sgdisk
        retention-days: 7
