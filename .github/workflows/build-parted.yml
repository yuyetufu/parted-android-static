name: Build Static sgdisk for Android arm64 (patched no popt no uuid no ncurses)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (minimal)
      run: |
        sudo apt update
        sudo apt install -y wget tar xz-utils build-essential g++ make

    - name: Download Android NDK r25c
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip -d $HOME
        echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25c" >> $GITHUB_ENV

    - name: Download gptfdisk 1.0.10 source
      run: |
        wget https://downloads.sourceforge.net/project/gptfdisk/gptfdisk/1.0.10/gptfdisk-1.0.10.tar.gz
        tar xf gptfdisk-1.0.10.tar.gz
        cd gptfdisk-1.0.10

    - name: Patch to remove popt, uuid, ncurses dependencies
      working-directory: gptfdisk-1.0.10
      run: |
        # 注释 popt.h include
        sed -i 's@#include <popt.h>@// #include <popt.h>@g' sgdisk.cc

        # 删除 popt 相关代码
        sed -i '/poptContext/d' sgdisk.cc
        sed -i '/poptGetArg/d' sgdisk.cc
        sed -i '/poptFreeContext/d' sgdisk.cc
        sed -i '/poptGetNextOpt/d' sgdisk.cc
        sed -i '/poptPrintHelp/d' sgdisk.cc
        sed -i '/poptPrintUsage/d' sgdisk.cc
        sed -i '/poptBadOption/d' sgdisk.cc

        # 添加 fallback argv 解析（逐行 echo 追加，避免转义）
        echo '// Fallback argv parsing without popt (added by patch)' >> sgdisk.cc
        echo 'char *device = NULL;' >> sgdisk.cc
        echo 'char *command = NULL;' >> sgdisk.cc
        echo 'for (int i = 1; i < argc; i++) {' >> sgdisk.cc
        echo '  if (argv[i][0] != '-') device = argv[i];' >> sgdisk.cc
        echo '  else command = argv[i];' >> sgdisk.cc
        echo '}' >> sgdisk.cc

        # 移除 uuid 依赖 - 彻底版
        sed -i 's@#include <uuid/uuid.h>@// #include <uuid/uuid.h>@g' guid.cc guid.h
        sed -i '/typedef uuid_t my_uuid_t/d' guid.h
        # 关键：同时替换 guid.h 中的 my_uuid_t uuidData; 为 uint8_t uuidData[16];
        sed -i 's/my_uuid_t uuidData;/uint8_t uuidData[16];/g' guid.h
        sed -i '/uuid_generate/d' guid.cc
        sed -i '/uuid_unparse/d' guid.cc
        sed -i '/uuid_clear/d' guid.cc
        sed -i '/uuid_copy/d' guid.cc
        sed -i '/uuid_is_null/d' guid.cc

        # 加必要头文件
        sed -i '1i #include <stdint.h>' guid.cc guid.h
        sed -i '/GenerateGUID() {/i #include <stdlib.h>\n#include <time.h>' guid.cc

        # 替换 GenerateGUID 逻辑为随机填充
        sed -i '/GenerateGUID() {/a srand(time(NULL));\nfor (int i = 0; i < 16; i++) uuidData[i] = (uint8_t)(rand() % 256);' guid.cc

        # 删除旧 memcpy
        sed -i '/memcpy(uuidData, orig.uuidData/d' guid.cc

        echo "Patched sgdisk.cc and guid.cc/guid.h: removed popt, uuid, ncurses dependencies"

    - name: Cross-compile static sgdisk
      working-directory: gptfdisk-1.0.10
      run: |
        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=21

        make \
          CC=$TOOLCHAIN/bin/$TARGET$API-clang \
          CXX=$TOOLCHAIN/bin/$TARGET$API-clang++ \
          AR=$TOOLCHAIN/bin/llvm-ar \
          LD=$TOOLCHAIN/bin/ld \
          RANLIB=$TOOLCHAIN/bin/llvm-ranlib \
          STRIP=$TOOLCHAIN/bin/llvm-strip \
          CXXFLAGS="-static -static-libgcc -static-libstdc++ -DNO_NCURSES -Wno-error -Wno-unused-command-line-argument" \
          LDFLAGS="-static" \
          sgdisk

        $TOOLCHAIN/bin/llvm-strip sgdisk

    - name: Verify binary
      run: |
        file gptfdisk-1.0.10/sgdisk
        ls -lh gptfdisk-1.0.10/sgdisk

    - name: Upload static sgdisk
      uses: actions/upload-artifact@v4
      with:
        name: sgdisk-static-android-arm64-patched
        path: gptfdisk-1.0.10/sgdisk
        retention-days: 7
